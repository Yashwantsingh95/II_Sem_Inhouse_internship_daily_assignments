<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bootstrap Project</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="#">MySite</a>
            <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#menu"><span
                    class="navbar-toggler-icon"></span></button>
            <div class="collapse navbar-collapse" id="menu">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="#">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="#features">Features</a></li>
                    <li class="nav-item"><a class="nav-link" href="#contact">Contact</a></li>
                </ul>
            </div>
        </div>
    </nav>
    <section class="hero py-5">
        <div class="container">
            <div class="row align-items-center">
                <div class="col-lg-6">
                    <h1>Build Websites Faster</h1>
                    <p>Responsive websites using Bootstrap.</p>
                    <a href="#" class="btn btn-primary">Get Started</a>
                </div>
                <div class="col-lg-6 text-center">
                    <img src="https://picsum.photos/500/300" class="img-fluid rounded">
                </div>
            </div>
        </div>
    </section>
    <section id="features" class="py-5">
        <div class="container">
            <div class="row g-3">
                <div class="col-md-4">
                    <div class="card shadow">
                        <div class="card-body text-center"><i class="fa-solid fa-code fa-2x text-primary"></i>
                            <h5 class="mt-2">Code</h5>
                        </div>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="card shadow">
                        <div class="card-body text-center"><i class="fa-solid fa-mobile-screen fa-2x text-primary"></i>
                            <h5 class="mt-2">Responsive</h5>
                        </div>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="card shadow">
                        <div class="card-body text-center"><i class="fa-solid fa-bolt fa-2x text-primary"></i>
                            <h5 class="mt-2">Fast</h5>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>
    <section id="contact" class="container py-5">
        <h2 class="text-center mb-3">Contact</h2>
        <input class="form-control mb-2" placeholder="Name">
        <input class="form-control mb-2" placeholder="Email">
        <textarea class="form-control mb-3" rows="3" placeholder="Message"></textarea>
        <button class="btn btn-primary">Send</button>
    </section>
    <footer class="bg-dark text-center text-white py-3">
        <p class="mb-1">© 2026 MySite</p>
    </footer>
    <!-- <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script> -->
</body>
</html>
